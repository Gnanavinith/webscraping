services:
  - type: web
    name: gmb-scout-server
    env: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: true
      - key: RENDER
        value: true
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/Server/.cache/puppeteer
