services:
  - type: web
    name: gmb-scout-server
    env: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: |
      apt-get update && apt-get install -y \
        wget \
        gnupg && \
      wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | apt-key add - && \
      sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list' && \
      apt-get update && apt-get install -y google-chrome-stable fonts-ipafont-gothic fonts-wqy-zenhei fonts-thai-tlwg fonts-kacst fonts-freefont-ttf libxss1 --no-install-recommends && \
      rm -rf /var/lib/apt/lists/*
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: true
      - key: RENDER
        value: true
